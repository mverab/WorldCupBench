name: Daily Score Update

on:
  schedule:
    # Run at 12:00 UTC daily during the World Cup (June - July 2026)
    - cron: '0 12 * 6,7 *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update-scores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Smoke test scoring pipeline
        run: |
          pytest tests/ -v
          echo "Smoke tests passed."

      - name: Fetch latest results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: |
          python scripts/fetch_results.py --all
          echo "Results fetched."

      - name: Run scoring engine
        run: |
          python scripts/score.py
          echo "Scoring complete."

      - name: Update README leaderboard
        run: |
          python src/generate_leaderboard.py --inject-readme
          echo "README updated."

      - name: Fetch Polymarket odds
        run: |
          python src/fetch_polymarket.py || echo "Polymarket fetch failed (non-blocking)"

      - name: Copy leaderboard to dashboard
        run: |
          # Copy leaderboard.json to docs/ for GitHub Pages
          if [ -f data/leaderboard.json ]; then
            mkdir -p docs/data
            cp data/leaderboard.json docs/data/leaderboard.json
            cp data/tournament.json docs/data/tournament.json
            # Generate predictions summary
            python scripts/generate_predictions_summary.py
          fi

      - name: Commit and push
        run: |
          git config user.name "WorldCupBench Bot"
          git config user.email "bot@worldcupbench.dev"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "[skip ci] auto: update scores $(date -u +%Y-%m-%d)"
            git push
          fi
